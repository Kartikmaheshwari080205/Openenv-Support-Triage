name: Precheck

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  precheck:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make precheck executable
        run: chmod +x precheck.sh

      - name: Run OpenEnv precheck
        run: ./precheck.sh
