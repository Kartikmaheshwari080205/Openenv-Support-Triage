name: openenv-support-triage
description: Real-world customer support triage simulation for training/evaluating agentic workflows.
version: 1.0.0
license: mit
tags:
  - openenv
  - customer-support
  - triage
  - agent-evaluation
domain: customer-support
difficulty: mixed
entrypoint: app.main:app
api:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader
  baseline: /baseline
models:
  observation: openenv_support_triage.models.Observation
  action: openenv_support_triage.models.Action
  reward: openenv_support_triage.models.Reward
tasks:
  - id: support-easy-001
    name: Billing + Login Triage
    difficulty: easy
    grader:
      id: support-ticket-grader
      endpoint: /grader
      type: deterministic
  - id: support-medium-001
    name: Priority SLA Handling
    difficulty: medium
    grader:
      id: support-ticket-grader
      endpoint: /grader
      type: deterministic
  - id: support-hard-001
    name: Fraud, Policy, and Escalation
    difficulty: hard
    grader:
      id: support-ticket-grader
      endpoint: /grader
      type: deterministic
graders:
  - id: support-ticket-grader
    type: deterministic
    endpoint: /grader
    output:
      score_range: [0.0, 1.0]
